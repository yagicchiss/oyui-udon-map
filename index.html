<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おゆいうどん　Map</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
  <img src="title.png" alt="おゆいうどん Map" class="title-image">
</header>

  <div class="container">
    <div class="map-wrapper">
      <img src="tokyo23-map.png" class="map-image" alt="東京23区地図">
      <div id="pinLayer"></div>
    </div>

    <aside class="place-list">
      <h2>場所一覧</h2>
      <ul id="placeList"></ul>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
